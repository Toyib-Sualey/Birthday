<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>✨ A Special Surprise For You ✨</title>
<link href="https://fonts.googleapis.com/css2?family=Pacifico&family=Dancing+Script:wght@700&family=Quicksand:wght@400;600;700&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { width: 100%; height: 100%; overflow: hidden; font-family: 'Quicksand', sans-serif; }

/* ── PAGES ── */
.page {
  position: fixed; top: 0; left: 0; width: 100%; height: 100%;
  display: none; flex-direction: column;
  align-items: center; justify-content: center;
}
.page.on { display: flex; }

/* ── PAGE 1 ── */
#p1 { background: linear-gradient(135deg,#FFE4F0,#F5D5FF,#FFD4E8,#FFE8D6); }

#p1-canvas {
  position: absolute; top: 0; left: 0;
  width: 100%; height: 100%;
  pointer-events: none;       /* never blocks input */
  z-index: 0;
}

.card {
  position: relative;
  z-index: 1;                 /* sits above canvas */
  background: rgba(255,255,255,0.82);
  backdrop-filter: blur(16px);
  border: 1.5px solid rgba(255,140,190,0.5);
  border-radius: 28px;
  padding: 2.6rem 3rem;
  text-align: center;
  width: min(440px, 90vw);
  box-shadow: 0 16px 50px rgba(255,107,157,0.22), 0 3px 14px rgba(199,125,255,0.15);
}
.card-icon { font-size: 2.4rem; margin-bottom: 0.4rem; display: block; }
.card-title {
  font-family: 'Dancing Script', cursive; font-size: 2.2rem;
  background: linear-gradient(135deg,#E91E8C,#C77DFF,#FF6B9D);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  line-height: 1.25; margin-bottom: 0.45rem;
}
.card-sub { color: #b5609a; font-size: 0.95rem; margin-bottom: 1.5rem; }

#nin {
  display: block;
  width: 100%;
  padding: 0.9rem 1.2rem;
  margin-bottom: 0.9rem;
  border: 2px solid rgba(255,107,157,0.35);
  border-radius: 50px;
  font-family: 'Quicksand', sans-serif;
  font-size: 1.05rem; font-weight: 600;
  background: #fff;
  color: #6b2a6b;
  outline: none;
  text-align: center;
  -webkit-appearance: none;
  appearance: none;
  pointer-events: all;        /* explicit — always clickable */
  position: relative; z-index: 2;
}
#nin::placeholder { color: #d4a0bf; }
#nin:focus { border-color: #FF6B9D; box-shadow: 0 0 0 4px rgba(255,107,157,0.15); }

#gob {
  display: block;
  width: 100%;
  padding: 0.9rem;
  border: none; border-radius: 50px; cursor: pointer;
  font-family: 'Quicksand', sans-serif;
  font-size: 1.05rem; font-weight: 700;
  background: linear-gradient(135deg,#FF6B9D,#C77DFF);
  color: #fff;
  box-shadow: 0 6px 20px rgba(255,107,157,0.4);
  position: relative; z-index: 2;
  pointer-events: all;
  -webkit-appearance: none; appearance: none;
  transition: transform .18s, box-shadow .18s;
}
#gob:hover  { transform: translateY(-2px); box-shadow: 0 10px 28px rgba(255,107,157,0.52); }
#gob:active { transform: scale(.98); }
.card-hint { margin-top: 0.8rem; font-size: 0.78rem; color: #c48ab0; }

@keyframes shake {
  0%,100%{transform:translateX(0)} 20%{transform:translateX(-8px)}
  40%{transform:translateX(8px)} 60%{transform:translateX(-5px)} 80%{transform:translateX(5px)}
}

/* ── PAGE 2 COUNTDOWN ── */
#p2 {
  background: radial-gradient(ellipse at 50% 30%,#3d0f5c,#1a0035 55%,#07000f);
  overflow: hidden;
}
#p2-stars { position:absolute;inset:0;pointer-events:none; }
.sd { position:absolute;border-radius:50%;background:#fff;animation:tw 2s infinite alternate; }
@keyframes tw { from{opacity:.12;transform:scale(.7)} to{opacity:1;transform:scale(1.3)} }
#cd {
  position: relative; z-index: 2;
  font-family: 'Dancing Script', cursive;
  font-size: clamp(10rem,30vw,19rem);
  line-height: 1;
  background: linear-gradient(135deg,#FFD700,#FF6B9D,#C77DFF,#FFD700);
  background-size: 300% 300%;
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  animation: gs 1.5s ease infinite;
  filter: drop-shadow(0 0 28px rgba(255,107,157,0.5));
  transition: transform .28s cubic-bezier(.17,.67,.4,1.5);
}
@keyframes gs { 0%{background-position:0 50%} 50%{background-position:100% 50%} 100%{background-position:0 50%} }
#cd-lbl {
  position: relative; z-index: 2;
  color: rgba(255,200,230,.75); font-size: 1rem;
  font-weight: 600; letter-spacing: .3em; text-transform: uppercase; margin-top: -.3rem;
}

/* ── PAGE 3 PARTY ── */
#p3 {
  background: linear-gradient(155deg,#1a0035,#2d0a4e 50%,#1a0035);
  overflow: hidden; position: relative;
}
#party-cv {
  position: absolute; top: 0; left: 0;
  width: 100%; height: 100%;
  pointer-events: none; z-index: 2;
}
#hb-wrap {
  position: absolute; inset: 0; z-index: 3;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  pointer-events: none;
  opacity: 0; transition: opacity 1.5s ease;
}
#hb-main {
  font-family: 'Pacifico', cursive;
  font-size: clamp(2.8rem,7.5vw,6.2rem);
  text-align: center; line-height: 1.3; padding: 0 1rem;
  background: linear-gradient(180deg,#fffbe0,#FFD700 35%,#FF9800 70%,#FF6B9D);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  text-shadow:
    0 1px 0 #bb8800,0 2px 0 #aa7700,0 3px 0 #996600,
    0 4px 0 #885500,0 5px 0 #774400,0 6px 0 #663300,
    0 9px 18px rgba(200,140,0,.65),0 15px 38px rgba(255,80,20,.3);
  animation: hbf 3.5s ease-in-out infinite;
}
#hb-name {
  font-family: 'Dancing Script', cursive;
  font-size: clamp(2.2rem,5.5vw,4.5rem);
  background: linear-gradient(135deg,#FF6B9D,#C77DFF,#FFD700);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  text-align: center; margin-top: .3rem;
  filter: drop-shadow(0 3px 10px rgba(255,107,157,.55));
  animation: hbf 3.5s ease-in-out .4s infinite;
}
@keyframes hbf { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-11px)} }
.pp {
  position: absolute; top: 18%; font-size: 4.5rem;
  z-index: 4; pointer-events: none; opacity: 0;
  transition: opacity .4s, left .7s cubic-bezier(.17,.67,.3,1.4), right .7s cubic-bezier(.17,.67,.3,1.4);
}
#pp-l { left: -90px; }
#pp-r { right: -90px; transform: scaleX(-1); }
#nbtn {
  position: absolute; bottom: 1.8rem; right: 1.8rem; z-index: 10;
  padding: .8rem 2rem; border: none; border-radius: 50px; cursor: pointer;
  font-family: 'Quicksand',sans-serif; font-size: .95rem; font-weight: 700;
  background: linear-gradient(135deg,#FF6B9D,#C77DFF); color: #fff;
  opacity: 0; pointer-events: none; transition: opacity .8s ease;
  box-shadow: 0 5px 20px rgba(255,107,157,.45);
  animation: pb 2.2s ease-in-out infinite;
}
#nbtn.on { opacity: 1; pointer-events: all; }
#nbtn:hover { transform: translateY(-2px) scale(1.05); }
@keyframes pb {
  0%,100%{box-shadow:0 5px 20px rgba(255,107,157,.45)}
  50%{box-shadow:0 8px 32px rgba(255,107,157,.75),0 0 0 5px rgba(255,107,157,.14)}
}

/* ── PAGE 4 ── */
#p4 { background: #000; }
#fin {
  font-family: 'Dancing Script', cursive;
  font-size: clamp(2.4rem,7vw,5.5rem);
  color: #fff; opacity: 0; transition: opacity 2.5s ease;
  padding: 1rem; line-height: 1.45; text-align: center;
  text-shadow: 0 0 40px rgba(255,107,157,.85),0 0 90px rgba(199,125,255,.45);
}
#fin.on { opacity: 1; }
</style>
</head>
<body>

<!-- PAGE 1 -->
<div class="page on" id="p1">
  <canvas id="p1-canvas"></canvas>
  <div class="card">
    <span class="card-icon">🌸</span>
    <h1 class="card-title">Psst... someone<br>has a surprise for you! 💝</h1>
    <p class="card-sub">Enter your name to unwrap it ✨</p>
    <input id="nin" type="text" placeholder="Your name here 🌷" maxlength="28" autocomplete="off" autocorrect="off" spellcheck="false"/>
    <button id="gob">Open My Surprise 🎀</button>
    <p class="card-hint">Press Enter or tap the button 💫</p>
  </div>
</div>

<!-- PAGE 2 -->
<div class="page" id="p2">
  <div id="p2-stars"></div>
  <div id="cd">5</div>
  <div id="cd-lbl">get ready ✨</div>
</div>

<!-- PAGE 3 -->
<div class="page" id="p3">
  <canvas id="party-cv"></canvas>
  <div id="hb-wrap">
    <div id="hb-main">Happy Birthday</div>
    <div id="hb-name"></div>
  </div>
  <div class="pp" id="pp-l">🎉</div>
  <div class="pp" id="pp-r">🎉</div>
  <button id="nbtn" onclick="gotoP4()">Next ✨</button>
</div>

<!-- PAGE 4 -->
<div class="page" id="p4">
  <div id="fin">You are the best. 💗</div>
</div>

<script>
'use strict';
const $ = id => document.getElementById(id);
let guestName = '';
let raf = null;

/* ── P1 FLOATING HEARTS ON CANVAS ── */
(function initHearts() {
  const cv = $('p1-canvas');
  const ctx = cv.getContext('2d');
  const emojis = ['🌸','💕','✨','🦋','💖','🌺','💗','⭐','🌷','💫','🎀','🌹'];
  let W, H, particles = [];

  function resize() {
    W = cv.width  = cv.offsetWidth;
    H = cv.height = cv.offsetHeight;
  }
  resize();
  window.addEventListener('resize', resize);

  for (let i = 0; i < 24; i++) {
    particles.push({
      e: emojis[i % emojis.length],
      x: Math.random() * 100,   /* percent */
      y: 110 + Math.random() * 20,
      speed: 0.012 + Math.random() * 0.018,
      size: 14 + Math.random() * 18,
      phase: Math.random() * Math.PI * 2,
      amp: 1.5 + Math.random() * 2,
      alpha: 0,
      delay: Math.random()
    });
  }

  function drawHearts() {
    ctx.clearRect(0, 0, W, H);
    const t = performance.now() / 1000;
    for (const p of particles) {
      const prog = ((t * p.speed + p.delay) % 1.2) / 1.2;
      if (prog < 0) continue;
      p.alpha = prog < 0.08 ? prog/0.08 : prog > 0.9 ? (1-prog)/0.1 : 1;
      const ry = (1 - prog) * H * 1.1;
      const rx = (p.x / 100) * W + Math.sin(t * 0.8 + p.phase) * p.amp * 8;
      ctx.save();
      ctx.globalAlpha = p.alpha * 0.22;
      ctx.font = `${p.size}px serif`;
      ctx.fillText(p.e, rx, ry);
      ctx.restore();
    }
    requestAnimationFrame(drawHearts);
  }
  drawHearts();
})();

/* ── PAGE SWITCH ── */
function show(id) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('on'));
  $(id).classList.add('on');
}

/* ── P1 INPUT ── */
function go() {
  const v = $('nin').value.trim();
  if (!v) {
    $('nin').style.borderColor = '#FF6B9D';
    $('nin').style.animation = 'shake 0.4s ease';
    setTimeout(() => { $('nin').style.animation = ''; $('nin').style.borderColor = ''; }, 450);
    return;
  }
  guestName = v[0].toUpperCase() + v.slice(1);
  $('hb-name').textContent = guestName + '! 🎂';
  try {
    const log = JSON.parse(localStorage.getItem('bvisit') || '[]');
    log.push({ name: guestName, time: new Date().toISOString() });
    localStorage.setItem('bvisit', JSON.stringify(log));
  } catch(e) {}
  startCountdown();
}
$('gob').addEventListener('click', go);
$('nin').addEventListener('keydown', e => { if (e.key === 'Enter') go(); });

/* ── P2 COUNTDOWN ── */
(function initStars() {
  const sf = $('p2-stars');
  sf.style.cssText = 'position:absolute;inset:0;pointer-events:none';
  for (let i = 0; i < 130; i++) {
    const s = document.createElement('div');
    s.className = 'sd';
    const sz = 1 + Math.random() * 3;
    s.style.cssText = `width:${sz}px;height:${sz}px;top:${Math.random()*100}%;left:${Math.random()*100}%;animation-delay:${Math.random()*2}s;animation-duration:${1+Math.random()*2.5}s`;
    sf.appendChild(s);
  }
})();

function startCountdown() {
  show('p2');
  let n = 5;
  const el = $('cd');
  function tick() {
    el.textContent = n;
    el.style.transform = 'scale(1.4)';
    setTimeout(() => el.style.transform = 'scale(1)', 130);
    if (n === 0) { setTimeout(startParty, 550); return; }
    n--;
    setTimeout(tick, 1000);
  }
  setTimeout(tick, 300);
}

/* ── P3 PARTY ── */
function startParty() {
  show('p3');

  /* size canvas now that page is visible */
  const cv = $('party-cv');
  cv.width  = window.innerWidth;
  cv.height = window.innerHeight;
  const W = cv.width, H = cv.height;
  const ctx = cv.getContext('2d');

  /* poppers */
  const pl = $('pp-l'), pr = $('pp-r');
  pl.style.opacity = '1'; pr.style.opacity = '1';
  setTimeout(() => { pl.style.left = '1.5%'; pr.style.right = '1.5%'; }, 80);

  /* HB text */
  setTimeout(() => $('hb-wrap').style.opacity = '1', 1600);

  /* next btn */
  setTimeout(() => $('nbtn').classList.add('on'), 9000);

  /* ── confetti ── */
  const COLS = ['#FF6B9D','#C77DFF','#FFD700','#FF9EC4','#B5EAD7','#FFB347','#87CEEB','#FF69B4','#DA70D6','#98FF98'];
  const conf = [];
  for (let i = 0; i < 280; i++) {
    const left = Math.random() < 0.5;
    conf.push({
      x: left ? -10 : W+10,
      y: H*0.05 + Math.random()*H*0.35,
      vx: (left?1:-1)*(9+Math.random()*13),
      vy: -(7+Math.random()*12),
      ay: 0.27+Math.random()*0.18,
      sz: 7+Math.random()*9,
      col: COLS[Math.floor(Math.random()*COLS.length)],
      type: Math.floor(Math.random()*3),
      rot: Math.random()*Math.PI*2,
      rv: (Math.random()-.5)*.24,
      a: 1,
      delay: i*2.2|0
    });
  }

  /* ── balloons ── */
  const PAL = [
    ['#FF6B9D','#FFADD0'],['#C77DFF','#E2B6FF'],['#FFD700','#FFE87A'],
    ['#FF4081','#FF8FAF'],['#00CED1','#80EEF0'],['#FF7043','#FFAB91'],
    ['#AB47BC','#CE93D8'],['#42A5F5','#90CAF9'],['#EF5350','#FFAAA8']
  ];
  const HBcx=W/2, HBcy=H/2, HBw=Math.min(W*.75,600), HBh=H*.38, HBtop=HBcy-HBh/2;
  const balls = Array.from({length:22}, () => {
    const c=PAL[Math.floor(Math.random()*PAL.length)], r=26+Math.random()*20;
    return { x:r+Math.random()*(W-2*r), y:H+r+Math.random()*H*.7,
             vx:(Math.random()-.5)*.5, vy:-(0.55+Math.random()*.85),
             r, base:c[0], hi:c[1], phase:Math.random()*Math.PI*2,
             swS:.008+Math.random()*.012, swA:.35+Math.random()*.45,
             t:0, settled:false };
  });

  function upd(b) {
    if (b.settled) {
      b.t+=b.swS*.5; b.x+=Math.sin(b.t+b.phase)*.18;
      b.x=Math.max(b.r,Math.min(W-b.r,b.x)); return;
    }
    b.t+=b.swS; b.vx+=Math.sin(b.t+b.phase)*b.swA*.012;
    b.vx*=.98; b.vy+=.009; b.x+=b.vx; b.y+=b.vy;
    if(b.x<b.r){b.x=b.r;b.vx=Math.abs(b.vx)*.6;}
    if(b.x>W-b.r){b.x=W-b.r;b.vx=-Math.abs(b.vx)*.6;}
    const inX=b.x>HBcx-HBw/2-b.r&&b.x<HBcx+HBw/2+b.r;
    if(inX&&b.y-b.r<HBtop+8&&b.y+b.r>HBtop-50&&b.vy<0){
      if(Math.random()<.5){b.settled=true;b.y=HBtop-b.r;b.vy=0;b.vx=(Math.random()-.5)*.4;}
      else{b.vy=Math.abs(b.vy)*.6;b.vx=(b.x<HBcx?-1:1)*(1.2+Math.random()*1.1);}
    }
    for(const o of balls){
      if(o===b)continue;
      const dx=b.x-o.x,dy=b.y-o.y,d=Math.sqrt(dx*dx+dy*dy),mn=b.r+o.r;
      if(d<mn&&d>0){const nx=dx/d,ny=dy/d,ov=(mn-d)*.5;
        b.x+=nx*ov;b.y+=ny*ov;o.x-=nx*ov;o.y-=ny*ov;
        const imp=((b.vx-o.vx)*nx+(b.vy-o.vy)*ny)*.78;
        b.vx-=imp*nx;b.vy-=imp*ny;o.vx+=imp*nx;o.vy+=imp*ny;}
    }
    if(b.y<-b.r*4){b.settled=false;b.x=b.r+Math.random()*(W-2*b.r);
      b.y=H+b.r;b.vy=-(0.55+Math.random()*.85);b.vx=(Math.random()-.5)*.5;}
  }

  function drwB(b) {
    const {x,y,r,base,hi}=b;
    const g=ctx.createRadialGradient(x-r*.3,y-r*.35,r*.05,x,y,r*1.1);
    g.addColorStop(0,hi);g.addColorStop(.55,base);g.addColorStop(1,base+'88');
    ctx.beginPath();ctx.ellipse(x,y,r,r*1.15,0,0,Math.PI*2);ctx.fillStyle=g;ctx.fill();
    ctx.beginPath();ctx.ellipse(x-r*.28,y-r*.36,r*.2,r*.11,-.5,0,Math.PI*2);
    ctx.fillStyle='rgba(255,255,255,.58)';ctx.fill();
    ctx.beginPath();ctx.moveTo(x-4,y+r*1.15);
    ctx.bezierCurveTo(x-7,y+r*1.26,x+7,y+r*1.26,x+4,y+r*1.15);
    ctx.closePath();ctx.fillStyle=base;ctx.fill();
    ctx.beginPath();ctx.moveTo(x,y+r*1.26);
    ctx.bezierCurveTo(x+11,y+r*1.26+16,x-9,y+r*1.26+32,x+2,y+r*1.26+48);
    ctx.strokeStyle='rgba(255,255,255,.32)';ctx.lineWidth=1.2;ctx.stroke();
  }

  function drwC(p) {
    ctx.save();ctx.translate(p.x,p.y);ctx.rotate(p.rot);
    ctx.globalAlpha=p.a;ctx.fillStyle=p.col;
    if(p.type===0){ctx.beginPath();ctx.arc(0,0,p.sz/2,0,Math.PI*2);ctx.fill();}
    else if(p.type===1){ctx.fillRect(-p.sz/2,-p.sz/4,p.sz,p.sz/2);}
    else{ctx.beginPath();
      for(let s=0;s<5;s++){const a=s*4*Math.PI/5-Math.PI/2;
        ctx.lineTo(Math.cos(a)*p.sz/2,Math.sin(a)*p.sz/2);
        ctx.lineTo(Math.cos(a+2*Math.PI/5)*p.sz/4,Math.sin(a+2*Math.PI/5)*p.sz/4);}
      ctx.closePath();ctx.fill();}
    ctx.restore();
  }

  let frame = 0;
  function loop() {
    ctx.clearRect(0,0,W,H);
    for(const p of conf){
      if(frame>=p.delay){p.vx*=.992;p.vy+=p.ay;p.x+=p.vx;p.y+=p.vy;p.rot+=p.rv;
        if(p.y>H+30)p.a=Math.max(0,p.a-.05);}
      if(p.a>0)drwC(p);
    }
    balls.forEach(b=>upd(b));
    balls.forEach(b=>drwB(b));
    frame++;
    raf=requestAnimationFrame(loop);
  }
  loop();
}

/* ── P4 ── */
function gotoP4() {
  if(raf){cancelAnimationFrame(raf);raf=null;}
  show('p4');
  setTimeout(()=>$('fin').classList.add('on'),500);
}

/* ── BTS ── */
window.getVisitors=()=>{try{return JSON.parse(localStorage.getItem('bvisit')||'[]');}catch(e){return[];}};
</script>
</body>
</html>
